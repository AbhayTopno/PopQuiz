# deployment-blue.yml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: popquiz
spec:
  serviceName: redis          # Must match the headless Redis Service name
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes", "--dir", "/data"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '256Mi'
          volumeMounts:
            - name: redis-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-backend-deployment-blue
  namespace: popquiz
  labels:
    app: popquiz-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-backend
  template:
    metadata:
      labels:
        app: popquiz-backend
        version: blue
    spec:
      containers:
        - name: popquiz-backend
          image: abhaytopno/popquiz-backend:v12
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-frontend-deployment-blue
  namespace: popquiz
  labels:
    app: popquiz-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-frontend
  template:
    metadata:
      labels:
        app: popquiz-frontend
        version: blue
    spec:
      containers:
        - name: popquiz-frontend
          image: abhaytopno/popquiz-frontend:v10
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
