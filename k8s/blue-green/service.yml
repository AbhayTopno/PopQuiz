# services.yml
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: popquiz
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# --- Backend Services ---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-backend-service-blue
  namespace: popquiz
spec:
  selector:
    app: popquiz-backend
    version: blue
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-backend-service-green
  namespace: popquiz
spec:
  selector:
    app: popquiz-backend
    version: green
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP

---
# --- Frontend Services ---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-frontend-service-blue
  namespace: popquiz
spec:
  selector:
    app: popquiz-frontend
    version: blue
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-frontend-service-green
  namespace: popquiz
spec:
  selector:
    app: popquiz-frontend
    version: green
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
