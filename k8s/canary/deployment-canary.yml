# deployment-canary.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: popquiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '256Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-backend-deployment-canary
  namespace: popquiz
spec:
  replicas: 1 # Start with fewer replicas for the canary
  selector:
    matchLabels:
      app: popquiz-backend-canary
  template:
    metadata:
      labels:
        app: popquiz-backend-canary
        version: canary # Label for the canary service
    spec:
      containers:
        - name: popquiz-backend
          image: abhaytopno/popquiz-backend-test # <-- NEW IMAGE VERSION
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /usr/src/app/.cache
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-frontend-deployment-canary
  namespace: popquiz
spec:
  replicas: 1 # Start with fewer replicas for the canary
  selector:
    matchLabels:
      app: popquiz-frontend-canary
  template:
    metadata:
      labels:
        app: popquiz-frontend-canary
        version: canary # Label for the canary service
    spec:
      containers:
        - name: popquiz-frontend
          image: abhaytopno/popquiz-frontend-test # <-- NEW IMAGE VERSION
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          envFrom:
            - configMapRef:
                name: frontend-config
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
