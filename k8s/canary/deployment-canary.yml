# deployment-canary.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: popquiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '256Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-backend-deployment-canary
  namespace: popquiz
  labels:
    app: popquiz-backend-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-backend-canary
  template:
    metadata:
      labels:
        app: popquiz-backend-canary
        version: canary
    spec:
      containers:
        - name: popquiz-backend
          image: abhaytopno/popquiz-backend:v12
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-frontend-deployment-canary
  namespace: popquiz
  labels:
    app: popquiz-frontend-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-frontend-canary
  template:
    metadata:
      labels:
        app: popquiz-frontend-canary
        version: canary
    spec:
      containers:
        - name: popquiz-frontend
          image: abhaytopno/popquiz-frontend:v10
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
