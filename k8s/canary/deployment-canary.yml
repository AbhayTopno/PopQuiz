apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: popquiz-redis
  namespace: popquiz
spec:
  serviceName: popquiz-redis
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-redis
  template:
    metadata:
      labels:
        app: popquiz-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes", "--dir", "/data"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '256Mi'
          volumeMounts:
            - name: redis-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: popquiz-qdrant
  namespace: popquiz
spec:
  serviceName: popquiz-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-qdrant
  template:
    metadata:
      labels:
        app: popquiz-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.17.1
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-langchain-canary
  namespace: popquiz
  labels:
    app: popquiz-langchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-langchain
      version: canary
  template:
    metadata:
      labels:
        app: popquiz-langchain
        version: canary
    spec:
      containers:
        - name: langchain
          image: abhaytopno/popquiz-langchain:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: langchain-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-backend-canary
  namespace: popquiz
  labels:
    app: popquiz-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-backend
      version: canary
  template:
    metadata:
      labels:
        app: popquiz-backend
        version: canary
    spec:
      containers:
        - name: backend
          image: abhaytopno/popquiz-backend:v12
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-frontend-canary
  namespace: popquiz
  labels:
    app: popquiz-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-frontend
      version: canary
  template:
    metadata:
      labels:
        app: popquiz-frontend
        version: canary
    spec:
      containers:
        - name: frontend
          image: abhaytopno/popquiz-frontend:v12
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'

