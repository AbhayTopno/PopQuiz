# deployment-stable.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: popquiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '256Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-backend-deployment-stable
  namespace: popquiz
  labels:
    app: popquiz-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-backend
  template:
    metadata:
      labels:
        app: popquiz-backend
    spec:
      containers:
        - name: popquiz-backend
          image: abhaytopno/popquiz-backend:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          env:
            - name: REDIS_URL
              value: 'redis://redis:6379'
            - name: PORT
              value: '5000'
            - name: NODE_ENV
              value: 'production'
            - name: NEXT_API
              value: 'https://YOUR_CLUSTER_IP.nip.io'
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popquiz-frontend-deployment-stable
  namespace: popquiz
  labels:
    app: popquiz-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: popquiz-frontend
  template:
    metadata:
      labels:
        app: popquiz-frontend
    spec:
      containers:
        - name: popquiz-frontend
          image: abhaytopno/popquiz-frontend:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
            - name: API_URL
              value: 'https://YOUR_CLUSTER_IP.nip.io'
            - name: SOCKET_URL
              value: 'https://YOUR_CLUSTER_IP.nip.io'
            - name: INTERNAL_API_URL
              value: 'http://popquiz-backend-service'
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
