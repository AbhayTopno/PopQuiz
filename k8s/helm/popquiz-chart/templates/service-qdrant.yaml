apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.qdrant.name }}
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .Values.qdrant.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.qdrant.httpPort }}
      targetPort: {{ .Values.qdrant.httpPort }}
    - name: grpc
      protocol: TCP
      port: {{ .Values.qdrant.grpcPort }}
      targetPort: {{ .Values.qdrant.grpcPort }}
