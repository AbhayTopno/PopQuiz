apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.qdrant.name }}
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ .Values.qdrant.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.qdrant.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.qdrant.name }}
    spec:
      containers:
        - name: {{ .Values.qdrant.name }}
          image: {{ .Values.qdrant.image }}
          ports:
            - containerPort: {{ .Values.qdrant.httpPort }}
              name: http
            - containerPort: {{ .Values.qdrant.grpcPort }}
              name: grpc
          resources:
            requests:
              cpu: {{ .Values.qdrant.resources.requests.cpu }}
              memory: {{ .Values.qdrant.resources.requests.memory }}
            limits:
              cpu: {{ .Values.qdrant.resources.limits.cpu }}
              memory: {{ .Values.qdrant.resources.limits.memory }}
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.qdrant.storage }}
