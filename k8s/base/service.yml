apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: popquiz
spec:
  clusterIP: None       # Headless: required by the StatefulSet for stable pod DNS
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-backend-service
  namespace: popquiz
spec:
  selector:
    app: popquiz-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: popquiz-frontend-service
  namespace: popquiz
spec:
  selector:
    app: popquiz-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
