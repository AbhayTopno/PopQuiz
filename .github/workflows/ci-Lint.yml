name: CI — Lint & Security

on:
  push:
    branches:
      - '**' # ✅ run on all branches
  pull_request:
    branches:
      - '**'
  workflow_dispatch: # ✅ manual run from GitHub UI

permissions:
  contents: read
  security-events: write # for CodeQL

jobs:
  # -----------------------------
  # Linting Stage
  # -----------------------------
  lint:
    name: "🧹 Lint: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            working-directory: frontend
            eslint_glob: 'src/**/*.{js,jsx,ts,tsx}'
            prettier_glob: 'src/**/*.{js,jsx,ts,tsx,json,md,css,scss}'
          - name: backend
            working-directory: backend
            eslint_glob: 'src/**/*.{js,ts}'
            prettier_glob: 'src/**/*.{js,ts,json,md}'
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '${{ matrix.working-directory }}/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm eslint "${{ matrix.eslint_glob }}" --max-warnings=0
      - run: pnpm prettier --check "${{ matrix.prettier_glob }}"

  lint-python:
    name: "🐍 Lint: langchain (Python)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langchain
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Format Check with Ruff
        run: uvx ruff format --check .
      - name: Lint with Ruff
        run: uvx ruff check .

  # -----------------------------
  # Validation Stage
  # -----------------------------
  docker-validate:
    name: "🐳 Validate: Docker & Compose"
    runs-on: ubuntu-latest
    needs: [lint, lint-python]
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy .env files from examples
        run: |
          cp docker-compose/.env.example.frontend.development docker-compose/.env.frontend
          cp docker-compose/.env.example.backend.development docker-compose/.env.backend
          cp docker-compose/.env.example.langchain docker-compose/.env.langchain
      - name: Lint Dockerfiles with Hadolint
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 frontend/docker/Dockerfile.dev
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 backend/docker/Dockerfile.dev
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 langchain/docker/Dockerfile.dev
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 frontend/docker/Dockerfile
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 backend/docker/Dockerfile
          docker run --rm -v "${{ github.workspace }}:/workspace" --workdir /workspace hadolint/hadolint:latest-debian hadolint --ignore DL3018 langchain/docker/Dockerfile
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint Docker Compose YAML files
        run: yamllint docker-compose/*.yml
      - name: Validate Docker Compose configurations
        run: |
          cd docker-compose
          for file in dev.yml production.yml staging.yml; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              docker compose -f "$file" config -q
            else
              echo "Skipping $file (file not found)"
            fi
          done

  k8s-validate:
    name: "☸️ Validate: K8s & Helm"
    runs-on: ubuntu-latest
    needs: [docker-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y curl tar
          # kubeconform
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
          # kube-linter
          curl -fsSL https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz | tar xz
          sudo mv kube-linter /usr/local/bin/
          # kubescape
          curl -fsSL https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
          echo "$HOME/.kubescape/bin" >> "$GITHUB_PATH"
          # helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Verify tools are available
        run: |
          set -euo pipefail
          kubeconform -v
          kube-linter version
          kubescape version
          helm version --short
      - name: Validate manifests with kubeconform
        run: kubeconform -summary -strict -skip CustomResourceDefinition,VerticalPodAutoscaler -ignore-missing-schemas k8s/base/*.yml k8s/autoscaling/hpa.yml k8s/autoscaling/vpa.yml k8s/blue-green/*.yml k8s/canary/*.yml
      - name: Lint manifests with kube-linter
        run: kube-linter lint --config .kube-linter.yaml k8s/base/
      - name: Security scan with Kubescape
        run: kubescape scan k8s/base/ --format junit --output results.xml
      - name: Lint Helm chart
        run: helm lint ./k8s/helm/popquiz-chart

  # -----------------------------
  # Security Scanning Stage
  # -----------------------------
  secret-scan:
    name: "🔐 Scan: Hardcoded Secrets"
    runs-on: ubuntu-latest
    needs: [lint, lint-python]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --regex --entropy --json --since-commit=22c3190

  trivy-image-scan:
    name: "🛡️ Scan: Trivy (${{ matrix.name }})"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    strategy:
      matrix:
        include:
          - name: frontend
            image: myapp-frontend
            dockerfile: frontend/docker/Dockerfile
            context: ./frontend
          - name: backend
            image: myapp-backend
            dockerfile: backend/docker/Dockerfile
            context: ./backend
          - name: langchain
            image: myapp-langchain
            dockerfile: langchain/docker/Dockerfile
            context: ./langchain
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }} Docker image
        run: docker build -t ${{ matrix.image }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}
      - name: Scan ${{ matrix.name }} image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ matrix.image }}'
          format: 'table'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

  # -----------------------------
  # Terraform Validation Stage
  # -----------------------------
  terraform-validate:
    name: "🏗️ Validate: Terraform"
    runs-on: ubuntu-latest
    needs: [k8s-validate]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Create terraform.tfvars for validation
        run: |
          cat > terraform.tfvars <<EOF
          project_id   = "test-project-id"
          region       = "asia-south1"
          zone         = "asia-south1-a"
          cluster_name = "test-cluster"
          environment  = "test"
          node_count   = 2
          machine_type = "e2-medium"
          disk_size    = 20
          disk_type    = "pd-standard"
          EOF

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # -----------------------------
  # Final Analysis Stage
  # -----------------------------
  codeql:
    name: "🔬 Scan: CodeQL"
    runs-on: ubuntu-latest
    needs: [trivy-image-scan, terraform-validate]
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
