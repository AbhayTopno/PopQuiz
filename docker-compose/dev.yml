---
services:
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.dev
    container_name: backend_dev
    ports:
      - '5000:5000'
    env_file:
      - .env.backend
    volumes:
      - ../backend:/usr/src/app:cached # Mount backend source code
      - /usr/src/app/node_modules # Prevent overwriting node_modules
      - /usr/src/app/dist # (optional) keep build artifacts inside container
    command: pnpm run dev
    networks:
      - myapp-network
    depends_on:
      - redis
      - langchain

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.dev
    container_name: frontend_dev
    ports:
      - '3000:3000'
    env_file:
      - .env.frontend
    volumes:
      - ../frontend:/usr/src/app:cached # Mount frontend code for live reload
      - /usr/src/app/node_modules # Prevent overwriting node_modules
      - /usr/src/app/.next # (optional) preserve Next.js cache
    depends_on:
      - backend
    command: pnpm run dev # Use Next.js dev mode
    networks:
      - myapp-network

  langchain:
    build:
      context: ../langchain
      dockerfile: docker/Dockerfile.dev
    container_name: langchain_dev
    ports:
      - '8000:8000'
    env_file:
      - .env.langchain
    volumes:
      - ../langchain:/usr/src/app:cached
      - /usr/src/app/.venv
    networks:
      - myapp-network
    restart: unless-stopped
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_dev
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - myapp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network

networks:
  myapp-network:

volumes:
  qdrant_data:
