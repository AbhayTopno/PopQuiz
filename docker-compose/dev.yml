---
services:
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.dev
    container_name: backend_dev
    ports:
      - '5000:5000'
    env_file:
      - .env.backend
    volumes:
      - ../backend:/usr/src/app:cached
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    command: pnpm run dev
    networks:
      - myapp-network
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.dev
    container_name: frontend_dev
    ports:
      - '3000:3000'
    env_file:
      - .env.frontend
    volumes:
      - ../frontend:/usr/src/app:cached
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - backend
    command: pnpm run dev
    networks:
      - myapp-network

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network

networks:
  myapp-network:
