---
services:
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile
      target: production
    container_name: myapp_backend_prod
    restart: unless-stopped
    env_file:
      - .env.backend
    ports:
      - '5000:5000'
    networks:
      - myapp-network
    depends_on:
      - redis
      - langchain

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile
    container_name: myapp_frontend_prod
    restart: unless-stopped
    env_file:
      - .env.frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - myapp-network

  langchain:
    build:
      context: ../langchain
      dockerfile: docker/Dockerfile
    container_name: myapp_langchain_prod
    restart: unless-stopped
    env_file:
      - .env.langchain
    ports:
      - '8000:8000'
    networks:
      - myapp-network
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myapp_qdrant_prod
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - myapp-network

  redis:
    image: redis:7-alpine
    container_name: myapp_redis_prod
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - myapp-network

networks:
  myapp-network:

volumes:
  qdrant_data:
